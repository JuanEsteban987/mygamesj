<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mi Editor Scratch</title>
  <!-- Librerías de Blockly -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/es.js"></script>
  <style>
    #blocklyDiv {
      height: 480px;
      width: 600px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="blocklyDiv"></div>
  <xml id="toolbox" style="display: none">
    <category name="Lógica" colour="#5C81A6">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
    </category>
    <!-- ... Aquí puedes añadir todas las categorías que necesites ... -->
  </xml>

  <script>
    // El cambio clave está aquí, en la configuración de la inyección
    const workspace = Blockly.inject('blocklyDiv', {
      toolbox: document.getElementById('toolbox'),
      renderer: 'zelos' // <--- ¡Esto es lo que activa el estilo Scratch 3.0! [5†L6][6†L10-L11]
    });
  </script>
</body>
</html>
