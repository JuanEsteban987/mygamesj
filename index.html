<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MATIAS · Block Studio</title>
  <!-- Fuentes & Estilo Moderno -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- Blockly -->
  <script src="https://unpkg.com/blockly@10.4.0/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/blocks.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/javascript.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/msg/es.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0c0e;
      color: #eef2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- HEADER ESTILO MATIAS --- */
    .app-header {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      background: rgba(18, 22, 28, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      z-index: 20;
    }

    .menu-btn {
      background: none;
      border: none;
      color: #c0ccd8;
      font-size: 24px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: all 0.2s;
      margin-right: 12px;
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #b7a4ff;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .brand-main {
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e0e7ff 0%, #b7a4ff 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-tag {
      font-weight: 400;
      font-size: 0.9rem;
      color: #8f9eb2;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 12px;
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d3dce6;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn:hover {
      background: #2a2f3a;
      border-color: #b7a4ff60;
      color: white;
      box-shadow: 0 4px 12px rgba(183, 164, 255, 0.15);
    }

    .run-btn {
      background: #6d5ac9;
      border-color: #8f7dff;
      color: white;
    }
    .run-btn:hover {
      background: #7f6ae0;
    }

    /* --- START MENU (overlay lateral) --- */
    .start-menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(6px);
      z-index: 50;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s ease;
    }

    .start-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100vh;
      background: #14181f;
      border-right: 1px solid #2c3540;
      box-shadow: 20px 0 40px rgba(0, 0, 0, 0.6);
      padding: 24px 16px;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      z-index: 60;
      display: flex;
      flex-direction: column;
    }

    .start-menu.active {
      transform: translateX(0);
    }

    .start-menu-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .menu-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 28px;
      border-bottom: 1px solid #2a3340;
      margin-bottom: 24px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #303b4a, #1e2530);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 22px;
      color: #b7a4ff;
      border: 1px solid #b7a4ff40;
    }

    .profile-text h3 {
      font-weight: 600;
      font-size: 1.2rem;
    }
    .profile-text p {
      color: #8f9eb2;
      font-size: 0.8rem;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: transparent;
      border: none;
      color: #d3dce6;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.15s;
      text-align: left;
    }

    .menu-item:hover {
      background: #262e3a;
      color: white;
    }

    .menu-item .icon {
      font-size: 20px;
      width: 24px;
      opacity: 0.8;
    }

    .menu-divider {
      margin: 16px 0;
      border-top: 1px solid #2a3340;
    }

    /* --- WORKSPACE AREA --- */
    .workspace-container {
      flex: 1;
      display: flex;
      position: relative;
      background: #0f1318;
    }

    #blocklyDiv {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* panel de salida (consola) */
    .output-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 360px;
      max-width: calc(100% - 40px);
      background: #1a2028e0;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #3f4a5a;
      border-radius: 20px;
      padding: 14px 18px;
      box-shadow: 0 20px 35px -5px #00000080;
      z-index: 15;
      color: #cfddee;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .output-header span {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      color: #b7a4ff;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #a0b3cc;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 20px;
    }
    .clear-btn:hover {
      background: #2e3a48;
      color: white;
    }

    #outputConsole {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      background: #0c1117;
      padding: 12px 14px;
      border-radius: 14px;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #2d3846;
      color: #d6e3f0;
    }

    /* ocultar elementos nativos de blockly que no queremos */
    .blocklyToolboxDiv {
      background: #1c232c !important;
      border-right: 1px solid #2f3b48 !important;
    }
    .blocklyFlyout {
      background: #1e2630 !important;
      border-right: 1px solid #3a4553 !important;
    }
    .blocklyFlyoutButton {
      fill: #2a3543 !important;
    }
    .blocklyText {
      fill: #e0e9f5 !important;
      font-family: 'Inter', sans-serif !important;
    }
    .blocklyMainBackground {
      fill: #11161c !important;
    }

    /* botón flotante import/export oculto (se maneja desde menú) */
    .file-input-hidden {
      display: none;
    }

    /* estética de tooltip */
    .blocklyTooltipDiv {
      background: #1e2a36 !important;
      color: #f0f5ff !important;
      border: 1px solid #62738b !important;
      box-shadow: 0 6px 14px black !important;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <button class="menu-btn" id="menuToggleBtn" aria-label="Menú inicio">☰</button>
  <div class="brand">
    <span class="brand-main">MATIAS</span>
    <span class="brand-tag">· block studio</span>
  </div>
  <div class="header-actions">
    <button class="action-btn" id="saveProjectBtn" title="Guardar proyecto (XML)">💾 Guardar</button>
    <button class="action-btn" id="loadProjectBtn" title="Importar proyecto">📂 Importar</button>
    <button class="action-btn run-btn" id="runCodeBtn">▶ Ejecutar</button>
  </div>
</header>

<!-- START MENU (lateral) -->
<div class="start-menu-overlay" id="menuOverlay"></div>
<nav class="start-menu" id="startMenu">
  <div class="menu-profile">
    <div class="avatar">DM</div>
    <div class="profile-text">
      <h3>David Matias</h3>
      <p>Brand & Webflow Designer</p>
    </div>
  </div>
  <div class="menu-items">
    <button class="menu-item" id="menuNewProject">
      <span class="icon">✨</span> Nuevo proyecto
    </button>
    <button class="menu-item" id="menuOpenExample">
      <span class="icon">📋</span> Cargar ejemplo
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menuSaveAs">
      <span class="icon">💾</span> Guardar como...
    </button>
    <button class="menu-item" id="menuImport">
      <span class="icon">📂</span> Importar proyecto
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menuClearOutput">
      <span class="icon">🧹</span> Limpiar consola
    </button>
  </div>
  <div style="margin-top: auto; font-size: 0.7rem; color: #5c6f87; padding: 16px 8px;">
    Creative Visual Designer<br>UI/UX · Mobile · Branding
  </div>
</nav>

<!-- Input file oculto para importar -->
<input type="file" id="fileInput" accept=".xml,text/xml" class="file-input-hidden" />

<!-- Área de trabajo Blockly -->
<div class="workspace-container">
  <div id="blocklyDiv"></div>
  
  <!-- Panel de salida estilo consola -->
  <div class="output-panel">
    <div class="output-header">
      <span>📟 CONSOLA DE EJECUCIÓN</span>
      <button class="clear-btn" id="clearConsoleBtn">limpiar</button>
    </div>
    <div id="outputConsole">// El resultado de ejecutar los bloques aparecerá aquí.<br>// Usa bloques de "imprimir" o "texto".</div>
  </div>
</div>

<!-- XML por defecto (workspace inicial) -->
<xml id="startBlocks" style="display:none">
  <block type="variables_set" x="30" y="30">
    <field name="VAR">mensaje</field>
    <value name="VALUE">
      <block type="text">
        <field name="TEXT">¡Hola desde Matias Block Studio!</field>
      </block>
    </value>
    <next>
      <block type="text_print">
        <value name="TEXT">
          <block type="variables_get">
            <field name="VAR">mensaje</field>
          </block>
        </value>
        <next>
          <block type="math_number">
            <field name="NUM">2026</field>
          </block>
        </next>
      </block>
    </next>
  </block>
</xml>

<script>
  (function(){
    "use strict";

    // ---- Configuración Blockly ----
    Blockly.setLocale(Blockly.Msg); 
    
    // Toolbox personalizada (estilo moderno)
    const toolbox = {
      "kind": "categoryToolbox",
      "contents": [
        { "kind": "category", "name": "Lógica", "colour": "#8f7dff", "contents": [
            { "kind": "block", "type": "controls_if" },
            { "kind": "block", "type": "logic_compare" },
            { "kind": "block", "type": "logic_operation" },
            { "kind": "block", "type": "logic_negate" },
            { "kind": "block", "type": "logic_boolean" }
        ]},
        { "kind": "category", "name": "Bucles", "colour": "#6d5ac9", "contents": [
            { "kind": "block", "type": "controls_repeat_ext" },
            { "kind": "block", "type": "controls_whileUntil" },
            { "kind": "block", "type": "controls_for" },
            { "kind": "block", "type": "controls_flow_statements" }
        ]},
        { "kind": "category", "name": "Matemáticas", "colour": "#4f9da6", "contents": [
            { "kind": "block", "type": "math_number" },
            { "kind": "block", "type": "math_arithmetic" },
            { "kind": "block", "type": "math_single" },
            { "kind": "block", "type": "math_constant" },
            { "kind": "block", "type": "math_number_property" },
            { "kind": "block", "type": "math_round" }
        ]},
        { "kind": "category", "name": "Texto", "colour": "#b76e9b", "contents": [
            { "kind": "block", "type": "text" },
            { "kind": "block", "type": "text_print" },
            { "kind": "block", "type": "text_join" },
            { "kind": "block", "type": "text_length" },
            { "kind": "block", "type": "text_isEmpty" }
        ]},
        { "kind": "category", "name": "Listas", "colour": "#d97742", "contents": [
            { "kind": "block", "type": "lists_create_with" },
            { "kind": "block", "type": "lists_repeat" },
            { "kind": "block", "type": "lists_length" },
            { "kind": "block", "type": "lists_isEmpty" }
        ]},
        { "kind": "category", "name": "Variables", "custom": "VARIABLE", "colour": "#b78b4f" },
        { "kind": "category", "name": "Funciones", "custom": "PROCEDURE", "colour": "#9e7bb5" }
      ]
    };

    // Inyectar workspace
    const workspace = Blockly.inject('blocklyDiv', {
      toolbox: toolbox,
      scrollbars: true,
      trashcan: true,
      media: 'https://unpkg.com/blockly@10.4.0/media/',
      zoom: {
        controls: true,
        wheel: true,
        startScale: 0.95,
        maxScale: 1.5,
        minScale: 0.5,
      },
      grid: {
        spacing: 20,
        length: 2,
        colour: '#2e3b4a',
        snap: true
      },
    });

    // Cargar bloques iniciales
    const startXml = document.getElementById('startBlocks');
    if (startXml) {
      Blockly.Xml.domToWorkspace(startXml, workspace);
    }

    // ---- Referencias UI ----
    const menuToggle = document.getElementById('menuToggleBtn');
    const startMenu = document.getElementById('startMenu');
    const overlay = document.getElementById('menuOverlay');
    const outputConsole = document.getElementById('outputConsole');
    const clearConsoleBtn = document.getElementById('clearConsoleBtn');
    const runBtn = document.getElementById('runCodeBtn');
    const saveBtn = document.getElementById('saveProjectBtn');
    const loadBtn = document.getElementById('loadProjectBtn');
    const fileInput = document.getElementById('fileInput');
    const menuNew = document.getElementById('menuNewProject');
    const menuExample = document.getElementById('menuOpenExample');
    const menuSaveAs = document.getElementById('menuSaveAs');
    const menuImport = document.getElementById('menuImport');
    const menuClearOut = document.getElementById('menuClearOutput');

    // ---- Funciones de menú inicio ----
    function openMenu() {
      startMenu.classList.add('active');
      overlay.classList.add('active');
    }
    function closeMenu() {
      startMenu.classList.remove('active');
      overlay.classList.remove('active');
    }
    
    menuToggle.addEventListener('click', openMenu);
    overlay.addEventListener('click', closeMenu);
    
    // Cerrar menú al hacer clic en una opción (excepto si es toggle)
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        closeMenu();
      });
    });

    // ---- Limpiar consola ----
    function clearConsole() {
      outputConsole.innerHTML = '// Consola limpia.';
    }
    clearConsoleBtn.addEventListener('click', clearConsole);
    if (menuClearOut) menuClearOut.addEventListener('click', clearConsole);

    // ---- Log personalizado para capturar console.log ----
    const originalLog = console.log;
    const logMessages = [];
    
    console.log = function(...args) {
      const msg = args.map(arg => {
        if (typeof arg === 'object') {
          try { return JSON.stringify(arg, null, 2); } catch(e) { return String(arg); }
        }
        return String(arg);
      }).join(' ');
      
      logMessages.push(msg);
      // Actualizar panel
      if (outputConsole) {
        if (outputConsole.innerHTML.startsWith('//') || outputConsole.innerHTML === '// Consola limpia.') {
          outputConsole.innerHTML = '';
        }
        const newLine = document.createElement('div');
        newLine.textContent = '> ' + msg;
        outputConsole.appendChild(newLine);
        outputConsole.scrollTop = outputConsole.scrollHeight;
      }
      originalLog.apply(console, args);
    };

    // ---- Ejecutar código generado ----
    function executeBlocks() {
      // Limpiar logs previos (pero mantenemos historial visual)
      logMessages.length = 0;
      if (!outputConsole.innerHTML.includes('>')) {
        outputConsole.innerHTML = '';
      } else {
        // añadir separador visual
        const sep = document.createElement('div');
        sep.textContent = '--- ejecución ---';
        sep.style.color = '#b7a4ff';
        outputConsole.appendChild(sep);
      }

      try {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        if (!code.trim()) {
          outputConsole.innerHTML += '<div style="color:#f5a97f;">⚠️ No hay bloques para ejecutar.</div>';
          return;
        }
        
        // Ejecutar en contexto aislado
        const func = new Function('console', code);
        func(console);
        
        // Si no hubo logs, mostrar mensaje
        if (logMessages.length === 0) {
          outputConsole.innerHTML += '<div style="color:#9ece6a;">✓ Ejecutado (sin salida).</div>';
        }
      } catch (e) {
        outputConsole.innerHTML += `<div style="color:#f7768e;">❌ Error: ${e.message}</div>`;
        console.error(e);
      }
    }

    runBtn.addEventListener('click', executeBlocks);

    // ---- Guardar proyecto (XML) ----
    function saveWorkspace() {
      const xml = Blockly.Xml.workspaceToDom(workspace);
      const xmlText = Blockly.Xml.domToPrettyText(xml);
      
      const blob = new Blob([xmlText], { type: 'application/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `matias_proyecto_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xml`;
      a.click();
      URL.revokeObjectURL(url);
      
      outputConsole.innerHTML += '<div style="color:#a6d6ff;">💾 Proyecto guardado.</div>';
    }

    saveBtn.addEventListener('click', saveWorkspace);
    if (menuSaveAs) menuSaveAs.addEventListener('click', saveWorkspace);

    // ---- Importar proyecto ----
    function importWorkspace(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const xml = Blockly.utils.xml.textToDom(e.target.result);
          workspace.clear();
          Blockly.Xml.domToWorkspace(xml, workspace);
          outputConsole.innerHTML += '<div style="color:#a6d6ff;">📂 Proyecto importado correctamente.</div>';
        } catch (err) {
          outputConsole.innerHTML += `<div style="color:#f7768e;">❌ Error al importar: ${err.message}</div>`;
        }
      };
      reader.readAsText(file);
    }

    loadBtn.addEventListener('click', () => fileInput.click());
    if (menuImport) menuImport.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = fileInput.files[0];
      if (file) {
        importWorkspace(file);
      }
      fileInput.value = ''; // permitir volver a seleccionar mismo archivo
    });

    // ---- Nuevo proyecto (limpiar workspace) ----
    function newProject() {
      if (confirm('¿Crear nuevo proyecto? Se perderán los cambios no guardados.')) {
        workspace.clear();
        clearConsole();
        outputConsole.innerHTML = '// Nuevo proyecto listo.';
      }
    }
    menuNew.addEventListener('click', newProject);

    // ---- Cargar ejemplo (demo visual) ----
    function loadExample() {
      workspace.clear();
      // cargar un ejemplo más elaborado
      const exampleXml = `
        <xml xmlns="https://developers.google.com/blockly/xml">
          <block type="variables_set" x="40" y="40">
            <field name="VAR">contador</field>
            <value name="VALUE">
              <block type="math_number"><field name="NUM">0</field></block>
            </value>
            <next>
              <block type="controls_repeat_ext">
                <value name="TIMES"><block type="math_number"><field name="NUM">5</field></block></value>
                <statement name="DO">
                  <block type="variables_set">
                    <field name="VAR">contador</field>
                    <value name="VALUE">
                      <block type="math_arithmetic">
                        <field name="OP">ADD</field>
                        <value name="A"><block type="variables_get"><field name="VAR">contador</field></block></value>
                        <value name="B"><block type="math_number"><field name="NUM">1</field></block></value>
                      </block>
                    </value>
                    <next>
                      <block type="text_print">
                        <value name="TEXT">
                          <block type="text_join">
                            <value name="ADD0"><block type="text"><field name="TEXT">Iteración: </field></block></value>
                            <value name="ADD1"><block type="variables_get"><field name="VAR">contador</field></block></value>
                          </block>
                        </value>
                      </block>
                    </next>
                  </block>
                </statement>
                <next>
                  <block type="text_print">
                    <value name="TEXT">
                      <block type="text"><field name="TEXT">🎉 ¡Finalizado! Matias Creative Visual</field></block>
                    </value>
                  </block>
                </next>
              </block>
            </next>
          </block>
        </xml>
      `;
      const dom = Blockly.utils.xml.textToDom(exampleXml);
      Blockly.Xml.domToWorkspace(dom, workspace);
      clearConsole();
      outputConsole.innerHTML = '// Ejemplo cargado: contador + bucle.';
    }
    if (menuExample) menuExample.addEventListener('click', loadExample);

    // ---- Botón limpiar consola flotante adicional ----
    document.getElementById('clearConsoleBtn').addEventListener('click', clearConsole);

    // Ajustar tamaño al cambiar ventana
    window.addEventListener('resize', () => {
      Blockly.svgResize(workspace);
    });
    
    // Inicial
    Blockly.svgResize(workspace);
    
    // Ajustar tema visual
    console.log('%c MATIAS BLOCK STUDIO ', 'background:#6d5ac9; color:#fff; font-weight:bold; border-radius:20px;');
    
    // Interceptar atajos: Ctrl+S para guardar
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        saveWorkspace();
      }
      if (e.key === 'Escape' && startMenu.classList.contains('active')) {
        closeMenu();
      }
    });
