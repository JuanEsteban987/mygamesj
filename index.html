<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MATIAS · ArcanicRunic Studio</title>
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- Blockly -->
  <script src="https://unpkg.com/blockly@10.4.0/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/blocks.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/javascript.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.0/msg/es.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0c0e;
      color: #eef2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* HEADER */
    .app-header {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      background: rgba(18, 22, 28, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      z-index: 20;
    }
    .menu-btn {
      background: none; border: none; color: #c0ccd8; font-size: 24px; cursor: pointer;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      border-radius: 12px; transition: all 0.2s; margin-right: 12px;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.06); color: #b7a4ff; }
    .brand { display: flex; align-items: baseline; gap: 6px; }
    .brand-main {
      font-weight: 600; font-size: 1.6rem; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e0e7ff 0%, #b7a4ff 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .brand-tag { font-weight: 400; font-size: 0.9rem; color: #8f9eb2; margin-left: 6px; text-transform: uppercase; letter-spacing: 2px; }
    .header-actions { margin-left: auto; display: flex; gap: 12px; }
    .action-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #d3dce6;
      padding: 8px 16px; border-radius: 30px; font-weight: 500; font-size: 0.9rem; cursor: pointer;
      backdrop-filter: blur(4px); transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .action-btn:hover { background: #2a2f3a; border-color: #b7a4ff60; color: white; }
    .run-btn { background: #6d5ac9; border-color: #8f7dff; color: white; }
    .run-btn:hover { background: #7f6ae0; }

    /* START MENU */
    .start-menu-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px); z-index:50; visibility: hidden; opacity:0; transition:0.25s;
    }
    .start-menu {
      position: fixed; top:0; left:0; width:300px; height:100vh; background:#14181f;
      border-right:1px solid #2c3540; box-shadow:20px 0 40px rgba(0,0,0,0.6);
      padding:24px 16px; transform: translateX(-100%); transition: transform 0.3s;
      z-index:60; display: flex; flex-direction: column;
    }
    .start-menu.active { transform: translateX(0); }
    .start-menu-overlay.active { visibility: visible; opacity:1; }
    .menu-profile { display: flex; align-items: center; gap:14px; padding-bottom:28px; border-bottom:1px solid #2a3340; margin-bottom:24px; }
    .avatar { width:52px; height:52px; background: linear-gradient(145deg,#303b4a,#1e2530); border-radius:18px; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:22px; color:#b7a4ff; border:1px solid #b7a4ff40; }
    .profile-text h3 { font-weight:600; font-size:1.2rem; }
    .profile-text p { color:#8f9eb2; font-size:0.8rem; }
    .menu-items { display:flex; flex-direction:column; gap:8px; flex:1; }
    .menu-item {
      display:flex; align-items:center; gap:14px; padding:14px 16px; background:transparent; border:none;
      color:#d3dce6; font-size:1rem; font-weight:500; border-radius:14px; cursor:pointer; text-align:left;
    }
    .menu-item:hover { background:#262e3a; color:white; }
    .menu-item .icon { font-size:20px; width:24px; opacity:0.8; }
    .menu-divider { margin:16px 0; border-top:1px solid #2a3340; }

    /* LAYOUT PRINCIPAL */
    .main-layout {
      flex:1; display:flex; overflow:hidden;
    }
    .blockly-area {
      flex:2; height:100%; position:relative; background:#0f1318;
    }
    #blocklyDiv {
      height:100%; width:100%; position:absolute; top:0; left:0;
    }
    .canvas-area {
      flex:1.2; background:#10151c; border-left:1px solid #2a3543; display:flex; flex-direction:column;
      padding:16px; overflow-y:auto;
    }
    .canvas-header {
      display:flex; justify-content:space-between; margin-bottom:12px;
    }
    .canvas-header h4 { color:#b7a4ff; font-weight:500; letter-spacing:1px; }
    #gameCanvas {
      background:#1a1f2a; border-radius:16px; border:1px solid #3f4a5a; width:100%; aspect-ratio:1/1;
      image-rendering: crisp-edges; /* pixel art */
    }
    .output-panel {
      margin-top:16px; background:#1a2028e0; backdrop-filter:blur(12px); border:1px solid #3f4a5a;
      border-radius:16px; padding:12px 16px;
    }
    .output-header { display:flex; justify-content:space-between; margin-bottom:8px; }
    .output-header span { color:#b7a4ff; font-weight:600; font-size:0.8rem; }
    #outputConsole {
      font-family: monospace; font-size:12px; background:#0c1117; padding:10px; border-radius:12px;
      max-height:120px; overflow-y:auto; white-space:pre-wrap; border:1px solid #2d3846;
    }
    .clear-btn { background:none; border:none; color:#a0b3cc; cursor:pointer; }
    .file-input-hidden { display:none; }

    /* sprite editor modal simple */
    .modal {
      position:fixed; top:0; left:0; width:100%; height:100%; background:#000000b0; backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:100; visibility:hidden;
    }
    .modal-content {
      background:#1e2630; padding:24px; border-radius:32px; border:1px solid #4a5a6e;
      max-width:500px; width:90%;
    }
    .pixel-grid { display:grid; gap:1px; background:#2e3b4a; padding:2px; border-radius:8px; }
    .pixel { background:#10161e; aspect-ratio:1/1; border-radius:2px; cursor:pointer; }
    .pixel.active { background:#b7a4ff; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <button class="menu-btn" id="menuToggleBtn">☰</button>
  <div class="brand">
    <span class="brand-main">MATIAS</span>
    <span class="brand-tag">· arcanic runic</span>
  </div>
  <div class="header-actions">
    <button class="action-btn" id="saveProjectBtn">💾 Guardar</button>
    <button class="action-btn" id="loadProjectBtn">📂 Importar</button>
    <button class="action-btn run-btn" id="runCodeBtn">▶ Ejecutar</button>
  </div>
</header>

<!-- MENU LATERAL -->
<div class="start-menu-overlay" id="menuOverlay"></div>
<nav class="start-menu" id="startMenu">
  <div class="menu-profile">
    <div class="avatar">DM</div>
    <div class="profile-text"><h3>David Matias</h3><p>Brand & Webflow Designer</p></div>
  </div>
  <div class="menu-items">
    <button class="menu-item" id="menuNewProject"><span class="icon">✨</span> Nuevo proyecto</button>
    <button class="menu-item" id="menuLoadExample"><span class="icon">📋</span> Cargar ejemplo</button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menuSaveAs"><span class="icon">💾</span> Guardar como...</button>
    <button class="menu-item" id="menuImport"><span class="icon">📂</span> Importar proyecto</button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menuClearOutput"><span class="icon">🧹</span> Limpiar consola</button>
  </div>
</nav>

<input type="file" id="fileInput" accept=".xml,text/xml" class="file-input-hidden" />

<!-- LAYOUT PRINCIPAL -->
<div class="main-layout">
  <div class="blockly-area">
    <div id="blocklyDiv"></div>
  </div>
  <div class="canvas-area">
    <div class="canvas-header">
      <h4>🎮 VISTA PREVIA</h4>
      <button class="action-btn" id="resetCanvasBtn" style="padding:4px 12px;">⟲ Reset</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="output-panel">
      <div class="output-header">
        <span>📟 CONSOLA</span>
        <button class="clear-btn" id="clearConsoleBtn">limpiar</button>
      </div>
      <div id="outputConsole">// Ejecuta el código ▶</div>
    </div>
  </div>
</div>

<!-- MODAL EDITOR SPRITE -->
<div class="modal" id="spriteModal">
  <div class="modal-content">
    <h3 style="color:#b7a4ff; margin-bottom:16px;">🎨 Editor Pixel Art</h3>
    <div style="display:flex; gap:16px;">
      <div>
        <label>Tamaño:</label>
        <select id="spriteSizeSelect" style="background:#2a3543; color:white; border:none; padding:4px; border-radius:8px;">
          <option value="16">16x16</option>
          <option value="32" selected>32x32</option>
          <option value="64">64x64</option>
        </select>
        <div id="pixelGridContainer" style="margin-top:12px;"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button id="clearSpriteBtn" class="action-btn">🧽 Limpiar</button>
        <button id="saveSpriteBtn" class="action-btn run-btn">✅ Guardar</button>
        <button id="closeModalBtn" class="action-btn">✖ Cerrar</button>
      </div>
    </div>
    <p style="margin-top:12px; font-size:0.8rem; color:#8f9eb2;">ID actual: <span id="editingSpriteId">-</span></p>
  </div>
</div>

<!-- BLOQUES INICIALES (oculto) -->
<xml id="startBlocks" style="display:none">
  <block type="event_whenstart" x="20" y="20"></block>
</xml>

<script>
  (function(){
    "use strict";
    Blockly.setLocale(Blockly.Msg);

    // ---------- MOTOR DE OBJETOS (Canvas) ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameObjects = new Map(); // id -> { x,y, width,height, color, spriteDataURL }
    let animationFrame = null;
    let running = false;
    const outputConsole = document.getElementById('outputConsole');
    
    function logToConsole(msg, isError=false) {
      const line = document.createElement('div');
      line.textContent = (isError?'❌ ':'> ') + msg;
      line.style.color = isError ? '#f7768e' : '#d6e3f0';
      outputConsole.appendChild(line);
      outputConsole.scrollTop = outputConsole.scrollHeight;
    }
    function clearConsoleUI() {
      outputConsole.innerHTML = '// Consola limpia.';
    }

    // Renderizado
    function renderCanvas() {
      ctx.clearRect(0,0,400,400);
      // grid sutil
      ctx.strokeStyle = '#2a3543';
      ctx.lineWidth = 0.5;
      for(let i=0;i<=400;i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke(); }
      for(let i=0;i<=400;i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke(); }
      
      for(let obj of gameObjects.values()) {
        if(obj.spriteDataURL) {
          const img = new Image();
          img.src = obj.spriteDataURL;
          if(img.complete) {
            ctx.drawImage(img, obj.x, obj.y, obj.width, obj.height);
          } else {
            img.onload = () => { ctx.drawImage(img, obj.x, obj.y, obj.width, obj.height); };
            // fallback color
            ctx.fillStyle = obj.color || '#b7a4ff';
            ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
          }
        } else {
          ctx.fillStyle = obj.color || '#b7a4ff';
          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
        ctx.strokeStyle = '#ffffff40';
        ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
        // mostrar ID
        ctx.fillStyle = 'white';
        ctx.font = '10px Inter';
        ctx.fillText(obj.id, obj.x+2, obj.y+12);
      }
    }

    function resetSimulation() {
      gameObjects.clear();
      renderCanvas();
    }

    // ---------- DEFINICIÓN DE BLOQUES PERSONALIZADOS ----------
    // Colores
    const MOVEMENT_COLOR = '#4f9da6';
    const OBJECT_COLOR = '#b78b4f';
    const EVENT_COLOR = '#9e7bb5';
    const FUNCTION_COLOR = '#b76e9b';

    // Mover X
    Blockly.Blocks['move_x'] = {
      init: function() {
        this.appendValueInput('STEPS').setCheck('Number').appendField('Mover X');
        this.appendDummyInput().appendField('ID').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(MOVEMENT_COLOR);
        this.setTooltip('Desplaza el objeto horizontalmente');
      }
    };
    Blockly.JavaScript['move_x'] = function(block) {
      let steps = Blockly.JavaScript.valueToCode(block, 'STEPS', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      let id = block.getFieldValue('ID');
      return `engine.moveX(${steps}, '${id}');\n`;
    };

    Blockly.Blocks['move_y'] = {
      init: function() {
        this.appendValueInput('STEPS').setCheck('Number').appendField('Mover Y');
        this.appendDummyInput().appendField('ID').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(MOVEMENT_COLOR);
      }
    };
    Blockly.JavaScript['move_y'] = function(block) {
      let steps = Blockly.JavaScript.valueToCode(block, 'STEPS', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      let id = block.getFieldValue('ID');
      return `engine.moveY(${steps}, '${id}');\n`;
    };

    Blockly.Blocks['create_object'] = {
      init: function() {
        this.appendDummyInput().appendField('Crear Objeto').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.appendValueInput('X').setCheck('Number').appendField('X:');
        this.appendValueInput('Y').setCheck('Number').appendField('Y:');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(OBJECT_COLOR);
      }
    };
    Blockly.JavaScript['create_object'] = function(block) {
      let id = block.getFieldValue('ID');
      let x = Blockly.JavaScript.valueToCode(block, 'X', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      let y = Blockly.JavaScript.valueToCode(block, 'Y', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      return `engine.createObject('${id}', ${x}, ${y});\n`;
    };

    Blockly.Blocks['set_size'] = {
      init: function() {
        this.appendDummyInput().appendField('Editar Tamaño').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.appendValueInput('W').setCheck('Number').appendField('Ancho');
        this.appendValueInput('H').setCheck('Number').appendField('Alto');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(OBJECT_COLOR);
      }
    };
    Blockly.JavaScript['set_size'] = function(block) {
      let id = block.getFieldValue('ID');
      let w = Blockly.JavaScript.valueToCode(block, 'W', Blockly.JavaScript.ORDER_ATOMIC) || '20';
      let h = Blockly.JavaScript.valueToCode(block, 'H', Blockly.JavaScript.ORDER_ATOMIC) || '20';
      return `engine.setSize('${id}', ${w}, ${h});\n`;
    };

    Blockly.Blocks['set_color'] = {
      init: function() {
        this.appendDummyInput().appendField('Editar Color').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.appendDummyInput().appendField('Color').appendField(new Blockly.FieldColour('#b7a4ff'), 'COLOR');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(OBJECT_COLOR);
      }
    };
    Blockly.JavaScript['set_color'] = function(block) {
      let id = block.getFieldValue('ID');
      let color = block.getFieldValue('COLOR');
      return `engine.setColor('${id}', '${color}');\n`;
    };

    // Sprite: abre modal
    Blockly.Blocks['edit_sprite'] = {
      init: function() {
        this.appendDummyInput().appendField('Editar Sprite').appendField(new Blockly.FieldTextInput('obj1'), 'ID');
        this.appendDummyInput().appendField('Pixel size').appendField(new Blockly.FieldDropdown([["16x16","16"],["32x32","32"],["64x64","64"]]), 'SIZE');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(OBJECT_COLOR);
      }
    };
    Blockly.JavaScript['edit_sprite'] = function(block) {
      let id = block.getFieldValue('ID');
      let size = block.getFieldValue('SIZE');
      return `engine.openSpriteEditor('${id}', ${size});\n`;
    };

    // Eventos
    Blockly.Blocks['event_whenstart'] = {
      init: function() {
        this.appendDummyInput().appendField('🚀 Al Iniciar');
        this.setNextStatement(true, null);
        this.setColour(EVENT_COLOR);
      }
    };
    // se maneja en ejecución

    Blockly.Blocks['event_keypress'] = {
      init: function() {
        this.appendDummyInput().appendField('⌨️ Al Presionar').appendField(new Blockly.FieldTextInput('Space'), 'KEY');
        this.appendStatementInput('DO').setCheck(null);
        this.setColour(EVENT_COLOR);
      }
    };

    Blockly.Blocks['event_collision'] = {
      init: function() {
        this.appendDummyInput().appendField('💥 Al Tocar').appendField(new Blockly.FieldTextInput('obj1'), 'ID1');
        this.appendDummyInput().appendField('con').appendField(new Blockly.FieldTextInput('obj2'), 'ID2');
        this.appendStatementInput('DO').setCheck(null);
        this.setColour(EVENT_COLOR);
      }
    };

    // Funciones
    Blockly.Blocks['function_def'] = {
      init: function() {
        this.appendDummyInput().appendField('📦 Función').appendField(new Blockly.FieldTextInput('miFuncion'), 'FUNC_ID');
        this.appendStatementInput('BODY').setCheck(null);
        this.setColour(FUNCTION_COLOR);
      }
    };
    Blockly.Blocks['function_call'] = {
      init: function() {
        this.appendDummyInput().appendField('⚡ Iniciar Función').appendField(new Blockly.FieldTextInput('miFuncion'), 'FUNC_ID');
        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(FUNCTION_COLOR);
      }
    };

    // Toolbox personalizada
    const toolbox = {
      kind: "categoryToolbox",
      contents: [
        { kind: "category", name: "🎬 Eventos", colour: EVENT_COLOR, contents: [
          { kind: "block", type: "event_whenstart" },
          { kind: "block", type: "event_keypress" },
          { kind: "block", type: "event_collision" }
        ]},
        { kind: "category", name: "📦 Objetos", colour: OBJECT_COLOR, contents: [
          { kind: "block", type: "create_object" },
          { kind: "block", type: "set_size" },
          { kind: "block", type: "set_color" },
          { kind: "block", type: "edit_sprite" }
        ]},
        { kind: "category", name: "🔄 Movimiento", colour: MOVEMENT_COLOR, contents: [
          { kind: "block", type: "move_x" },
          { kind: "block", type: "move_y" }
        ]},
        { kind: "category", name: "⚙️ Funciones", colour: FUNCTION_COLOR, contents: [
          { kind: "block", type: "function_def" },
          { kind: "block", type: "function_call" }
        ]},
        { kind: "sep" },
        { kind: "category", name: "📐 Matemáticas", colour: "#4f9da6", contents: [
          { kind: "block", type: "math_number" },
          { kind: "block", type: "math_arithmetic" }
        ]},
        { kind: "category", name: "📝 Texto", colour: "#b76e9b", contents: [
          { kind: "block", type: "text" },
          { kind: "block", type: "text_print" }
        ]}
      ]
    };

    const workspace = Blockly.inject('blocklyDiv', { toolbox, scrollbars: true, trashcan: true, zoom: { controls: true, wheel: true } });
    Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), workspace);

    // ---------- MOTOR JS (interfaz) ----------
    const engine = {
      moveX: (dx, id) => { if(gameObjects.has(id)) gameObjects.get(id).x += Number(dx); renderCanvas(); },
      moveY: (dy, id) => { if(gameObjects.has(id)) gameObjects.get(id).y += Number(dy); renderCanvas(); },
      createObject: (id, x, y) => { gameObjects.set(id, { id, x:Number(x), y:Number(y), width:30, height:30, color:'#b7a4ff' }); renderCanvas(); },
      setSize: (id, w, h) => { if(gameObjects.has(id)) { gameObjects.get(id).width = w; gameObjects.get(id).height = h; } renderCanvas(); },
      setColor: (id, color) => { if(gameObjects.has(id)) gameObjects.get(id).color = color; renderCanvas(); },
      openSpriteEditor: (id, size) => { openSpriteModal(id, size); }
    };
    window.engine = engine;

    // Modal sprite
    let currentSpriteId = null, currentSize = 32, spriteData = [];
    const modal = document.getElementById('spriteModal');
    function openSpriteModal(id, size) {
      currentSpriteId = id; currentSize = size;
      document.getElementById('editingSpriteId').textContent = id;
      buildPixelGrid(size);
      modal.style.visibility = 'visible';
    }
    function buildPixelGrid(s) {
      const cont = document.getElementById('pixelGridContainer');
      cont.innerHTML = ''; spriteData = Array(s*s).fill(false);
      const grid = document.createElement('div'); grid.className = 'pixel-grid';
      grid.style.gridTemplateColumns = `repeat(${s}, 1fr)`;
      grid.style.width = '240px';
      for(let i=0;i<s*s;i++) {
        const pix = document.createElement('div'); pix.className = 'pixel';
        pix.addEventListener('click', (e)=>{
          spriteData[i] = !spriteData[i];
          pix.style.backgroundColor = spriteData[i] ? '#b7a4ff' : '#10161e';
        });
        grid.appendChild(pix);
      }
      cont.appendChild(grid);
    }
    document.getElementById('clearSpriteBtn').onclick = ()=> buildPixelGrid(currentSize);
    document.getElementById('saveSpriteBtn').onclick = ()=>{
      const size = currentSize; const tempCanvas = document.createElement('canvas'); tempCanvas.width = size; tempCanvas.height = size;
      const tCtx = tempCanvas.getContext('2d');
      for(let i=0;i<size*size;i++) {
        if(spriteData[i]) {
          tCtx.fillStyle = '#b7a4ff'; tCtx.fillRect(i%size, Math.floor(i/size), 1,1);
        }
      }
      const dataURL = tempCanvas.toDataURL();
      if(gameObjects.has(currentSpriteId)) gameObjects.get(currentSpriteId).spriteDataURL = dataURL;
      renderCanvas(); modal.style.visibility = 'hidden';
    };
    document.getElementById('closeModalBtn').onclick = ()=> modal.style.visibility = 'hidden';

    // Ejecución
    function executeArcanic() {
      clearConsoleUI();
      const code = Blockly.JavaScript.workspaceToCode(workspace);
      try {
        const func = new Function('engine', 'console', 'log', code);
        func(engine, console, logToConsole);
        renderCanvas();
      } catch(e) { logToConsole(e.message, true); }
    }
    document.getElementById('runCodeBtn').onclick = executeArcanic;
    document.getElementById('resetCanvasBtn').onclick = ()=>{ resetSimulation(); renderCanvas(); };

    // Guardar / importar (similar)
    // (Implementación completa de menú, guardar/importar como en versión previa)
    // ... (agregar listeners)
  })();
</script>
